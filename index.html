<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landlourd</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    header { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); padding: 2rem; text-align: center; border-bottom: 2px solid #3b82f6; }
    header h1 { font-size: 2rem; color: #f8fafc; margin-bottom: 0.25rem; }
    header p { color: #94a3b8; font-size: 0.95rem; }

    .search-container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

    .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-bar input { flex: 1; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: #f1f5f9; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .search-bar input:focus { border-color: #3b82f6; }
    .search-bar button { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; background: #3b82f6; color: white; font-size: 1rem; cursor: pointer; font-weight: 600; transition: background 0.2s; }
    .search-bar button:hover { background: #2563eb; }

    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; flex: 1; }
    .filters select { padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #475569; background: #1e293b; color: #cbd5e1; font-size: 0.875rem; cursor: pointer; outline: none; }

    .btn-add { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #22c55e; background: transparent; color: #22c55e; font-size: 0.875rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-add:hover { background: #22c55e; color: #0f172a; }

    .results-count { color: #94a3b8; font-size: 0.875rem; margin-bottom: 1rem; }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; transition: border-color 0.2s, transform 0.1s; cursor: pointer; }
    .card:hover { border-color: #3b82f6; transform: translateY(-1px); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .card-name { font-size: 1.15rem; font-weight: 700; color: #f1f5f9; }
    .card-rating { display: flex; align-items: center; gap: 0.25rem; }
    .stars { color: #fbbf24; font-size: 0.9rem; }
    .rating-num { color: #94a3b8; font-size: 0.85rem; }

    .card-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.5rem; margin-bottom: 0.75rem; }
    .detail { display: flex; align-items: center; gap: 0.4rem; color: #94a3b8; font-size: 0.875rem; }
    .detail .label { color: #64748b; }
    .detail .value { color: #cbd5e1; font-weight: 500; }

    .card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .tag { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .tag-green { background: #064e3b; color: #6ee7b7; }
    .tag-red { background: #7f1d1d; color: #fca5a5; }
    .tag-yellow { background: #713f12; color: #fde68a; }
    .tag-blue { background: #1e3a5f; color: #93c5fd; }

    .card-properties { color: #64748b; font-size: 0.8rem; }
    .card-properties span { color: #94a3b8; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; padding: 1rem; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1e293b; border: 1px solid #475569; border-radius: 16px; max-width: 650px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
    .modal h2 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f1f5f9; }
    .modal-rating { margin-bottom: 1rem; }
    .modal-section { margin-bottom: 1.25rem; }
    .modal-section h3 { color: #3b82f6; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem 1.5rem; }
    .modal-grid .row { display: flex; justify-content: space-between; }
    .modal-grid .row .lbl { color: #64748b; }
    .modal-grid .row .val { color: #e2e8f0; font-weight: 500; }
    .review { background: #0f172a; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; }
    .review-header { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
    .review-author { color: #cbd5e1; font-weight: 600; font-size: 0.875rem; }
    .review-date { color: #64748b; font-size: 0.8rem; }
    .review-text { color: #94a3b8; font-size: 0.875rem; line-height: 1.4; }

    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn-edit { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #3b82f6; background: transparent; color: #3b82f6; font-size: 0.875rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-edit:hover { background: #3b82f6; color: white; }
    .btn-delete { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #ef4444; background: transparent; color: #ef4444; font-size: 0.875rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-delete:hover { background: #ef4444; color: white; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: #64748b; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* Form modal */
    .form-modal { background: #1e293b; border: 1px solid #475569; border-radius: 16px; max-width: 550px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
    .form-modal h2 { font-size: 1.3rem; margin-bottom: 1.25rem; color: #f1f5f9; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; color: #94a3b8; font-size: 0.8rem; margin-bottom: 0.25rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.6rem 0.75rem; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #f1f5f9; font-size: 0.9rem; outline: none; font-family: inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #3b82f6; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }
    .btn-save { padding: 0.6rem 1.25rem; border-radius: 6px; border: none; background: #3b82f6; color: white; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
    .btn-save:hover { background: #2563eb; }
    .btn-cancel { padding: 0.6rem 1.25rem; border-radius: 6px; border: 1px solid #475569; background: transparent; color: #94a3b8; font-size: 0.9rem; cursor: pointer; }
    .btn-cancel:hover { border-color: #94a3b8; }

    @media (max-width: 600px) {
      .card-details { grid-template-columns: 1fr; }
      .modal-grid { grid-template-columns: 1fr; }
      .search-bar { flex-direction: column; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏠 Landlourd</h1>
  <p>Search and review landlords in your area</p>
</header>

<div class="search-container">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by name, address, or borough..." autofocus>
    <button onclick="doSearch()">Search</button>
  </div>
  <div class="toolbar">
    <div class="filters">
      <select id="filterBorough" onchange="doSearch()">
        <option value="">All Boroughs</option>
        <option value="Manhattan">Manhattan</option>
        <option value="Brooklyn">Brooklyn</option>
        <option value="Queens">Queens</option>
        <option value="Bronx">Bronx</option>
        <option value="Staten Island">Staten Island</option>
      </select>
      <select id="filterRating" onchange="doSearch()">
        <option value="">Any Rating</option>
        <option value="4">4+ Stars</option>
        <option value="3">3+ Stars</option>
        <option value="2">2+ Stars</option>
        <option value="1">1+ Stars</option>
      </select>
      <select id="filterSort" onchange="doSearch()">
        <option value="rating-desc">Highest Rated</option>
        <option value="rating-asc">Lowest Rated</option>
        <option value="name">Name A-Z</option>
        <option value="properties">Most Properties</option>
      </select>
    </div>
    <button class="btn-add" onclick="openForm()">+ Add Landlord</button>
  </div>
  <div class="results-count" id="resultsCount"></div>
  <div id="results"></div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Form modal -->
<div class="modal-overlay" id="formModal" onclick="closeFormModal(event)">
  <div class="form-modal">
    <h2 id="formTitle">Add Landlord</h2>
    <input type="hidden" id="formId">
    <div class="form-row">
      <div class="form-group"><label>Name</label><input type="text" id="fName" placeholder="Company name"></div>
      <div class="form-group"><label>Owner</label><input type="text" id="fOwner" placeholder="Owner name"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Borough</label>
        <select id="fBorough">
          <option value="Manhattan">Manhattan</option>
          <option value="Brooklyn">Brooklyn</option>
          <option value="Queens">Queens</option>
          <option value="Bronx">Bronx</option>
          <option value="Staten Island">Staten Island</option>
        </select>
      </div>
      <div class="form-group"><label>Zip</label><input type="text" id="fZip" placeholder="10001"></div>
    </div>
    <div class="form-group"><label>Address</label><input type="text" id="fAddress" placeholder="123 Main St"></div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input type="text" id="fPhone" placeholder="(212) 555-0000"></div>
      <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="contact@example.com"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Properties</label><input type="number" id="fProperties" value="0"></div>
      <div class="form-group"><label>Units</label><input type="number" id="fUnits" value="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Avg Rent</label><input type="text" id="fAvgRent" placeholder="$2,000"></div>
      <div class="form-group"><label>Registered Year</label><input type="text" id="fRegistered" placeholder="2020"></div>
    </div>
    <div class="form-group"><label>Tags (comma-separated)</label><input type="text" id="fTags" placeholder="responsive, well-maintained"></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeFormModal()">Cancel</button>
      <button class="btn-save" onclick="saveForm()">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eaevppdtlgyoptsizdpr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhZXZwcGR0bGd5b3B0c2l6ZHByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTAyMDAsImV4cCI6MjA5MDI4NjIwMH0.HqzhLWJvn7e0nRLnKTZvX27Q_q6b3dmimV_3jkYeFaw';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

let landlords = [];

async function api(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers, ...options });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadLandlords() {
  landlords = await api('landlords?order=id.asc');
  doSearch();
}

async function loadReviews(landlordId) {
  return api(`reviews?landlord_id=eq.${landlordId}&order=date.desc`);
}

function getStars(rating) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
}

function getTagClass(tag) {
  const green = ['responsive', 'well-maintained', 'pet-friendly', 'community-oriented', 'family-friendly', 'improving', 'quiet-area'];
  const red = ['unresponsive', 'violation-heavy', 'rent-disputes', 'slow-repairs', 'overpriced'];
  const blue = ['diverse-community', 'new-management', 'large-portfolio', 'trendy-area'];
  if (green.includes(tag)) return 'tag-green';
  if (red.includes(tag)) return 'tag-red';
  if (blue.includes(tag)) return 'tag-blue';
  return 'tag-yellow';
}

function renderCard(l) {
  return `<div class="card" onclick="openModal(${l.id})">
    <div class="card-header">
      <div class="card-name">${l.name}</div>
      <div class="card-rating">
        <span class="stars">${getStars(l.rating)}</span>
        <span class="rating-num">${l.rating} (${l.reviews_count})</span>
      </div>
    </div>
    <div class="card-details">
      <div class="detail"><span class="label">Owner:</span> <span class="value">${l.owner}</span></div>
      <div class="detail"><span class="label">Borough:</span> <span class="value">${l.borough}</span></div>
      <div class="detail"><span class="label">Address:</span> <span class="value">${l.address}</span></div>
      <div class="detail"><span class="label">Avg Rent:</span> <span class="value">${l.avg_rent}</span></div>
    </div>
    <div class="card-tags">${l.tags.map(t => `<span class="tag ${getTagClass(t)}">${t}</span>`).join('')}</div>
    <div class="card-properties">Properties: <span>${l.properties}</span> · Units: <span>${l.units}</span> · Violations: <span>${l.open_violations} open</span></div>
  </div>`;
}

function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const borough = document.getElementById('filterBorough').value;
  const minRating = parseFloat(document.getElementById('filterRating').value) || 0;
  const sort = document.getElementById('filterSort').value;

  let filtered = landlords.filter(l => {
    const matchesQuery = !q || l.name.toLowerCase().includes(q) || l.owner.toLowerCase().includes(q) || l.address.toLowerCase().includes(q) || l.borough.toLowerCase().includes(q) || l.zip.includes(q);
    const matchesBorough = !borough || l.borough === borough;
    const matchesRating = l.rating >= minRating;
    return matchesQuery && matchesBorough && matchesRating;
  });

  if (sort === 'rating-desc') filtered.sort((a, b) => b.rating - a.rating);
  else if (sort === 'rating-asc') filtered.sort((a, b) => a.rating - b.rating);
  else if (sort === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));
  else if (sort === 'properties') filtered.sort((a, b) => b.properties - a.properties);

  document.getElementById('resultsCount').textContent = `${filtered.length} landlord${filtered.length !== 1 ? 's' : ''} found`;

  if (filtered.length === 0) {
    document.getElementById('results').innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No landlords match your search. Try different filters.</p></div>`;
  } else {
    document.getElementById('results').innerHTML = filtered.map(renderCard).join('');
  }
}

async function openModal(id) {
  const l = landlords.find(x => x.id === id);
  const reviewList = await loadReviews(id);
  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('active')">&times;</button>
    <h2>${l.name}</h2>
    <div class="modal-rating"><span class="stars">${getStars(l.rating)}</span> <span class="rating-num">${l.rating} / 5 · ${l.reviews_count} reviews</span></div>

    <div class="modal-section">
      <h3>Contact & Info</h3>
      <div class="modal-grid">
        <div class="row"><span class="lbl">Owner</span><span class="val">${l.owner}</span></div>
        <div class="row"><span class="lbl">Phone</span><span class="val">${l.phone || '—'}</span></div>
        <div class="row"><span class="lbl">Email</span><span class="val">${l.email || '—'}</span></div>
        <div class="row"><span class="lbl">Address</span><span class="val">${l.address}, ${l.zip}</span></div>
        <div class="row"><span class="lbl">Borough</span><span class="val">${l.borough}</span></div>
        <div class="row"><span class="lbl">Registered</span><span class="val">${l.registered || '—'}</span></div>
      </div>
    </div>

    <div class="modal-section">
      <h3>Portfolio</h3>
      <div class="modal-grid">
        <div class="row"><span class="lbl">Properties</span><span class="val">${l.properties}</span></div>
        <div class="row"><span class="lbl">Total Units</span><span class="val">${l.units}</span></div>
        <div class="row"><span class="lbl">Avg Rent</span><span class="val">${l.avg_rent}</span></div>
        <div class="row"><span class="lbl">Total Violations</span><span class="val">${l.violations}</span></div>
        <div class="row"><span class="lbl">Open Violations</span><span class="val" style="color:${l.open_violations > 5 ? '#f87171' : '#6ee7b7'}">${l.open_violations}</span></div>
      </div>
    </div>

    <div class="modal-section">
      <h3>Tags</h3>
      <div class="card-tags">${l.tags.map(t => `<span class="tag ${getTagClass(t)}">${t}</span>`).join('')}</div>
    </div>

    <div class="modal-section">
      <h3>Recent Reviews</h3>
      ${reviewList.length ? reviewList.map(r => `<div class="review">
        <div class="review-header">
          <span class="review-author">${r.author} <span class="stars" style="font-size:0.8rem">${getStars(r.stars)}</span></span>
          <span class="review-date">${r.date}</span>
        </div>
        <div class="review-text">${r.text}</div>
      </div>`).join('') : '<p style="color:#64748b">No reviews yet.</p>'}
    </div>

    <div class="modal-actions">
      <button class="btn-edit" onclick="document.getElementById('modal').classList.remove('active'); openForm(${l.id})">Edit</button>
      <button class="btn-delete" onclick="deleteLandlord(${l.id})">Delete</button>
    </div>
  `;
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('active');
  }
}

// --- CRUD Form ---

function openForm(id) {
  const form = document.getElementById('formModal');
  document.getElementById('formId').value = '';
  document.getElementById('formTitle').textContent = 'Add Landlord';
  document.getElementById('fName').value = '';
  document.getElementById('fOwner').value = '';
  document.getElementById('fBorough').value = 'Manhattan';
  document.getElementById('fAddress').value = '';
  document.getElementById('fZip').value = '';
  document.getElementById('fPhone').value = '';
  document.getElementById('fEmail').value = '';
  document.getElementById('fProperties').value = '0';
  document.getElementById('fUnits').value = '0';
  document.getElementById('fAvgRent').value = '';
  document.getElementById('fRegistered').value = '';
  document.getElementById('fTags').value = '';

  if (id) {
    const l = landlords.find(x => x.id === id);
    document.getElementById('formTitle').textContent = 'Edit Landlord';
    document.getElementById('formId').value = l.id;
    document.getElementById('fName').value = l.name;
    document.getElementById('fOwner').value = l.owner;
    document.getElementById('fBorough').value = l.borough;
    document.getElementById('fAddress').value = l.address;
    document.getElementById('fZip').value = l.zip;
    document.getElementById('fPhone').value = l.phone || '';
    document.getElementById('fEmail').value = l.email || '';
    document.getElementById('fProperties').value = l.properties;
    document.getElementById('fUnits').value = l.units;
    document.getElementById('fAvgRent').value = l.avg_rent || '';
    document.getElementById('fRegistered').value = l.registered || '';
    document.getElementById('fTags').value = (l.tags || []).join(', ');
  }

  form.classList.add('active');
}

function closeFormModal(e) {
  if (!e || e.target === document.getElementById('formModal')) {
    document.getElementById('formModal').classList.remove('active');
  }
}

async function saveForm() {
  const id = document.getElementById('formId').value;
  const tags = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const body = {
    name: document.getElementById('fName').value,
    owner: document.getElementById('fOwner').value,
    borough: document.getElementById('fBorough').value,
    address: document.getElementById('fAddress').value,
    zip: document.getElementById('fZip').value,
    phone: document.getElementById('fPhone').value || null,
    email: document.getElementById('fEmail').value || null,
    properties: parseInt(document.getElementById('fProperties').value) || 0,
    units: parseInt(document.getElementById('fUnits').value) || 0,
    avg_rent: document.getElementById('fAvgRent').value || null,
    registered: document.getElementById('fRegistered').value || null,
    tags
  };

  if (!body.name || !body.owner || !body.address) {
    alert('Name, owner, and address are required.');
    return;
  }

  if (id) {
    await api(`landlords?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(body) });
  } else {
    await api('landlords', { method: 'POST', body: JSON.stringify(body) });
  }

  closeFormModal();
  await loadLandlords();
}

async function deleteLandlord(id) {
  if (!confirm('Delete this landlord? This cannot be undone.')) return;
  await api(`landlords?id=eq.${id}`, { method: 'DELETE' });
  document.getElementById('modal').classList.remove('active');
  await loadLandlords();
}

// --- Init ---
document.getElementById('searchInput').addEventListener('input', doSearch);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modal').classList.remove('active');
    document.getElementById('formModal').classList.remove('active');
  }
});

loadLandlords();
</script>
</body>
</html>
